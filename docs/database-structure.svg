<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">TaxiPoint Database Structure</title>
  <desc id="desc">Black and white UML-style database diagram for TaxiPoint.</desc>
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111111; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #444444; }
      .entity { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .entity-dashed { fill: #ffffff; stroke: #111111; stroke-width: 2; stroke-dasharray: 8 6; }
      .entity-title { font: 700 18px Arial, sans-serif; fill: #111111; }
      .field { font: 400 14px Arial, sans-serif; fill: #111111; }
      .label { font: 400 13px Arial, sans-serif; fill: #111111; }
      .line { stroke: #111111; stroke-width: 2; fill: none; }
      .dash { stroke: #111111; stroke-width: 2; fill: none; stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#111111" />
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#ffffff" />

  <text x="800" y="76" text-anchor="middle" class="title">TaxiPoint Database Structure</text>
  <text x="800" y="104" text-anchor="middle" class="subtitle">UML-style view of the core entities and their relationships</text>

  <!-- users -->
  <g>
    <rect x="40" y="130" width="180" height="220" class="entity" />
    <text x="130" y="160" text-anchor="middle" class="entity-title">users</text>
    <text x="58" y="194" class="field">PK id</text>
    <text x="58" y="218" class="field">name</text>
    <text x="58" y="242" class="field">surname</text>
    <text x="58" y="266" class="field">email (UNIQUE)</text>
    <text x="58" y="290" class="field">password_hash</text>
    <text x="58" y="314" class="field">role</text>
  </g>

  <!-- taxi_ranks -->
  <g>
    <rect x="380" y="150" width="220" height="170" class="entity" />
    <text x="490" y="180" text-anchor="middle" class="entity-title">taxi_ranks</text>
    <text x="402" y="214" class="field">PK id</text>
    <text x="402" y="238" class="field">name</text>
    <text x="402" y="262" class="field">location (PostGIS)</text>
    <text x="402" y="286" class="field">routes_served (JSONB)</text>
    <text x="402" y="310" class="field">route_fares (JSONB)</text>
  </g>

  <!-- incidents -->
  <g>
    <rect x="1020" y="130" width="220" height="190" class="entity" />
    <text x="1130" y="160" text-anchor="middle" class="entity-title">incidents</text>
    <text x="1042" y="194" class="field">PK id</text>
    <text x="1042" y="218" class="field">description</text>
    <text x="1042" y="242" class="field">reporter (TEXT)</text>
    <text x="1042" y="266" class="field">location</text>
    <text x="1042" y="290" class="field">resolved</text>
    <text x="1042" y="314" class="field">created_at</text>
  </g>

  <!-- password_reset_tokens -->
  <g>
    <rect x="680" y="150" width="220" height="200" class="entity-dashed" />
    <text x="790" y="180" text-anchor="middle" class="entity-title">password_reset_tokens</text>
    <text x="702" y="214" class="field">PK id</text>
    <text x="702" y="238" class="field">email</text>
    <text x="702" y="262" class="field">token</text>
    <text x="702" y="286" class="field">expiry_date</text>
    <text x="702" y="310" class="field">used</text>
  </g>

  <!-- correction_submissions -->
  <g>
    <rect x="420" y="380" width="240" height="230" class="entity" />
    <text x="540" y="410" text-anchor="middle" class="entity-title">correction_submissions</text>
    <text x="442" y="444" class="field">PK id</text>
    <text x="442" y="468" class="field">FK rank_id</text>
    <text x="442" y="492" class="field">FK submitted_by_user_id</text>
    <text x="442" y="516" class="field">FK reviewed_by_user_id</text>
    <text x="442" y="540" class="field">status</text>
    <text x="442" y="564" class="field">description</text>
    <text x="442" y="594" class="field">created_at</text>
  </g>

  <!-- correction_votes -->
  <g>
    <rect x="450" y="660" width="180" height="180" class="entity" />
    <text x="540" y="690" text-anchor="middle" class="entity-title">correction_votes</text>
    <text x="472" y="724" class="field">PK id</text>
    <text x="472" y="748" class="field">FK submission_id</text>
    <text x="472" y="772" class="field">FK voter_user_id</text>
    <text x="472" y="796" class="field">vote_type</text>
    <text x="472" y="820" class="field">created_at</text>
  </g>

  <!-- Relationships -->
  <!-- users -> correction_submissions -->
  <path class="line" d="M130 350 L130 430 L420 430" marker-end="url(#arrow)" />

  <!-- users -> correction_votes -->
  <path class="line" d="M110 350 L110 720 L450 720" marker-end="url(#arrow)" />

  <!-- taxi_ranks -> correction_submissions -->
  <path class="line" d="M490 320 L490 380" marker-end="url(#arrow)" />

  <!-- correction_submissions -> correction_votes -->
  <path class="line" d="M540 610 L540 660" marker-end="url(#arrow)" />

  <!-- users -> password_reset_tokens -->
  <path class="dash" d="M220 130 L790 130 L790 150" marker-end="url(#arrow)" />

  <text x="800" y="920" text-anchor="middle" class="subtitle">
    `password_reset_tokens.email` is a lookup only, and `incidents.reporter` is stored as text for flexibility.
  </text>
</svg>
