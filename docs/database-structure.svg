<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">TaxiPoint Database Structure</title>
  <desc id="desc">A diagram of the main TaxiPoint database tables and their relationships.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1f3b73" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4361ee" />
    </marker>
    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .header { font: 700 22px Arial, sans-serif; fill: #ffffff; text-transform: lowercase; }
      .header-small { font: 700 18px Arial, sans-serif; fill: #ffffff; text-transform: lowercase; }
      .field { font: 400 16px Arial, sans-serif; fill: #334155; }
      .note { font: 400 15px Arial, sans-serif; fill: #64748b; }
      .line { stroke: #4361ee; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)" />

  <text x="800" y="70" text-anchor="middle" class="title">TaxiPoint Database Structure</text>
  <text x="800" y="102" text-anchor="middle" class="subtitle">Main tables, data fields, and the relationships used by the app</text>

  <!-- users -->
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="320" height="310" rx="22" fill="#ffffff" stroke="#d9e4f5" />
    <rect x="70" y="150" width="320" height="58" rx="22" fill="#2563eb" />
    <text x="102" y="187" class="header">users</text>
    <text x="102" y="240" class="field">id</text>
    <text x="102" y="267" class="field">name, surname</text>
    <text x="102" y="294" class="field">email, password_hash</text>
    <text x="102" y="321" class="field">role</text>
    <text x="102" y="348" class="field">notifications, sound_alerts</text>
    <text x="102" y="375" class="field">auto_refresh, location_sharing</text>
    <text x="102" y="402" class="field">dark_mode, created_at, updated_at</text>
  </g>

  <!-- taxi_ranks -->
  <g filter="url(#shadow)">
    <rect x="470" y="150" width="360" height="320" rx="22" fill="#ffffff" stroke="#d9e4f5" />
    <rect x="470" y="150" width="360" height="58" rx="22" fill="#0f766e" />
    <text x="502" y="187" class="header">taxi_ranks</text>
    <text x="502" y="240" class="field">id, name</text>
    <text x="502" y="267" class="field">description, address</text>
    <text x="502" y="294" class="field">location, district</text>
    <text x="502" y="321" class="field">routes_served, route_fares</text>
    <text x="502" y="348" class="field">hours, phone, currency</text>
    <text x="502" y="375" class="field">facilities, active</text>
    <text x="502" y="402" class="field">created_at, updated_at</text>
  </g>

  <!-- incidents -->
  <g filter="url(#shadow)">
    <rect x="910" y="150" width="320" height="260" rx="22" fill="#ffffff" stroke="#d9e4f5" />
    <rect x="910" y="150" width="320" height="58" rx="22" fill="#7c3aed" />
    <text x="942" y="187" class="header">incidents</text>
    <text x="942" y="240" class="field">id</text>
    <text x="942" y="267" class="field">description</text>
    <text x="942" y="294" class="field">reporter, location</text>
    <text x="942" y="321" class="field">resolved</text>
    <text x="942" y="348" class="field">created_at</text>
  </g>

  <!-- password_reset_tokens -->
  <g filter="url(#shadow)">
    <rect x="1260" y="150" width="270" height="260" rx="22" fill="#ffffff" stroke="#d9e4f5" />
    <rect x="1260" y="150" width="270" height="58" rx="22" fill="#f97316" />
    <text x="1292" y="182" class="header-small">password_reset_tokens</text>
    <text x="1292" y="240" class="field">id, token</text>
    <text x="1292" y="267" class="field">email</text>
    <text x="1292" y="294" class="field">expiry_date</text>
    <text x="1292" y="321" class="field">used</text>
    <text x="1292" y="348" class="field">created_at, updated_at</text>
    <text x="1292" y="378" class="note">lookup by email, not FK</text>
  </g>

  <!-- correction_submissions -->
  <g filter="url(#shadow)">
    <rect x="170" y="560" width="410" height="290" rx="22" fill="#ffffff" stroke="#d9e4f5" />
    <rect x="170" y="560" width="410" height="58" rx="22" fill="#db2777" />
    <text x="202" y="597" class="header">correction_submissions</text>
    <text x="202" y="650" class="field">id, rank_id, rank_name_snapshot</text>
    <text x="202" y="677" class="field">correction_type, description</text>
    <text x="202" y="704" class="field">details, status</text>
    <text x="202" y="731" class="field">submitted_by_user_id, submitted_by_email</text>
    <text x="202" y="758" class="field">reviewed_by_user_id, reviewed_at</text>
    <text x="202" y="785" class="field">created_at, updated_at</text>
  </g>

  <!-- correction_votes -->
  <g filter="url(#shadow)">
    <rect x="670" y="590" width="340" height="230" rx="22" fill="#ffffff" stroke="#d9e4f5" />
    <rect x="670" y="590" width="340" height="58" rx="22" fill="#1d4ed8" />
    <text x="702" y="627" class="header">correction_votes</text>
    <text x="702" y="680" class="field">id, submission_id</text>
    <text x="702" y="707" class="field">voter_user_id, voter_email</text>
    <text x="702" y="734" class="field">vote_type</text>
    <text x="702" y="761" class="field">created_at, updated_at</text>
  </g>

  <!-- relationships -->
  <path class="line" d="M230 460 L230 560" />
  <path class="line" d="M390 410 L260 560" />
  <path class="line" d="M670 470 L370 560" />
  <path class="line" d="M580 720 L670 705" />

  <!-- relationship labels -->
  <text x="200" y="520" class="note">submitted_by_user_id</text>
  <text x="280" y="505" class="note">voter_user_id</text>
  <text x="525" y="535" class="note">rank_id</text>
  <text x="720" y="698" class="note">submission_id</text>

  <text x="800" y="915" text-anchor="middle" class="subtitle">TaxiPoint keeps rank data, live incidents, corrections, and account recovery separate but connected where needed.</text>
</svg>
